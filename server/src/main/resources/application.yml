# Java1234微信小程序个人健康管理系统 - 后端配置
server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: health-management-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://192.168.16.146:3306/health_management?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:QQ7951aa##}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: qwen3.7-plus
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 2048

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.server.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 文件上传根目录
file:
  upload-dir: ${FILE_UPLOAD_DIR:C:/mini_program/uploads}
